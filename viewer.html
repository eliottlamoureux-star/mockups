    .nav-btn { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 100px; border: 1.5px solid #333; background: transparent; color: #888; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .nav-btn:hover { border-color: #527843; color: #82b86a; background: rgba(82,120,67,0.1); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .counter { font-size: 12px; color: #555; white-space: nowrap; }
    .current-name { font-size: 13px; font-weight: 600; color: #f0f0f0; flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px; white-space: nowrap; }
    .status-ok { color: #34d399; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.25); }
    .status-pending { color: #fbbf24; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25); }
    .kbd { font-size: 11px; color: #444; margin-left: auto; white-space: nowrap; }
    .progress { font-size: 11px; color: #527843; font-weight: 600; white-space: nowrap; }
    .body { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 220px; flex-shrink: 0; background: #111; border-right: 1px solid #1e1e1e; overflow-y: auto; padding: 12px 0; }
    .sidebar-item { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all .12s; }
    .sidebar-item:hover { background: #1a1a1a; }
    .sidebar-item.active { border-left-color: #527843; background: #1a1a1a; }
    .sidebar-item .s-name { font-size: 12px; font-weight: 600; color: #d0d0d0; line-height: 1.3; }
    .sidebar-item .s-ind { font-size: 11px; color: #555; margin-top: 2px; }
    .sidebar-item.pending .s-name { color: #555; }
    .sidebar-item.pending .s-ind { color: #3a3a3a; }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; flex-shrink: 0; }
    .dot-ok { background: #34d399; }
    .dot-pending { background: #3a3a3a; }
    .preview-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    iframe { flex: 1; border: none; width: 100%; height: 100%; background: #fff; }
    .placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #444; }
    .placeholder p { font-size: 14px; }
    .placeholder code { font-size: 12px; color: #527843; background: rgba(82,120,67,0.1); padding: 8px 14px; border-radius: 8px; }

let current = 0;

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  profiles.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'sidebar-item' + (p.generated ? '' : ' pending') + (i === 0 ? ' active' : '');
    el.id = 'sb-' + i;
    el.innerHTML = '<div class="s-name"><span class="dot ' + (p.generated ? 'dot-ok' : 'dot-pending') + '"></span>' + p.name + '</div><div class="s-ind">' + p.industry + '</div>';
    el.onclick = () => goTo(i);
    sb.appendChild(el);
  });
}

function goTo(i) {
  current = i;
  const p = profiles[i];
  document.querySelectorAll('.sidebar-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
  const item = document.getElementById('sb-' + i);
  if (item) item.scrollIntoView({ block: 'nearest' });
  document.getElementById('counter').textContent = (i + 1) + ' / ' + profiles.length;
  document.getElementById('current-name').textContent = p.name;
  const statusEl = document.getElementById('current-status');
  if (p.generated) {
    statusEl.textContent = 'Generated';
    statusEl.className = 'tag status-ok';
  } else {
    statusEl.textContent = 'Pending';
    statusEl.className = 'tag status-pending';
  }
  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-next').disabled = i === profiles.length - 1;
  const frame = document.getElementById('preview-frame');
  const placeholder = document.getElementById('placeholder');
  if (p.generated) {
    frame.src = p.slug + '.html';
    frame.style.display = '';
    placeholder.style.display = 'none';
  } else {
    frame.src = '';
    frame.style.display = 'none';
    placeholder.style.display = 'flex';
  }
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < profiles.length) goTo(next);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});

buildSidebar();
goTo(0);
